name: Refresh AI Trend Data (Hyperscaler Capex / ARR / Mag7 PE)

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: '手动触发原因'
        required: false
        default: 'Manual AI trend refresh'

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    permissions:
      contents: write
      models: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests duckduckgo_search
      - name: Run AI trend refresh script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/refresh_ai_trend.py
      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ai_trend.json
          git diff --staged --quiet && echo "No changes." && exit 0
          git commit -m "chore: refresh AI trend $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
