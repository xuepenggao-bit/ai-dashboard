name: Refresh Portfolio Data (热股榜 + 权重股舆情)

on:
  schedule:
    - cron: '*/15 1-7 * * 1-5'
  workflow_dispatch:
    inputs:
      reason:
        description: '手动触发原因'
        required: false
        default: 'Dashboard manual refresh'

concurrency:
  group: refresh-xueqiu
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    permissions:
      contents: write
      models: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests duckduckgo_search

      - name: Run refresh script
        env:
          XQ_COOKIE: ${{ secrets.XQ_COOKIE }}
          XQ_TOKEN: ${{ secrets.XQ_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/refresh_data.py

      - name: Commit and push data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/xq_hot.json data/ir_records.json
          git diff --staged --quiet && echo "No changes." && exit 0
          git commit -m "chore: refresh data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
